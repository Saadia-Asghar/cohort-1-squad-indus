openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      parameters:
        - name: sort
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /orders/bulk:
    post:
      operationId: bulkCreateOrders
      tags: [orders]
      summary: Bulk create orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderBulkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Order:
      type: object
      required:
        - id
        - customerName
        - cakeType
        - deliveryType
        - price
        - paymentStatus
        - status
        - source
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: ["string", "null"]
        cakeType:
          type: string
        flavor:
          type: ["string", "null"]
        weight:
          type: ["string", "null"]
        designNotes:
          type: ["string", "null"]
        deliveryDate:
          type: ["string", "null"]
        deliveryTime:
          type: ["string", "null"]
        deliveryType:
          type: string
        price:
          type: number
        paymentStatus:
          type: string
        status:
          type: string
        specialRequests:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        source:
          type: string
        confidence:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    OrderInput:
      type: object
      required:
        - customerName
        - cakeType
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        cakeType:
          type: string
        flavor:
          type: string
        weight:
          type: string
        designNotes:
          type: string
        deliveryDate:
          type: string
        deliveryTime:
          type: string
        deliveryType:
          type: string
        price:
          type: number
        paymentStatus:
          type: string
        status:
          type: string
        specialRequests:
          type: string
        notes:
          type: string
        source:
          type: string
        confidence:
          type: ["integer", "null"]
    OrderUpdate:
      type: object
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        cakeType:
          type: string
        flavor:
          type: string
        weight:
          type: string
        designNotes:
          type: string
        deliveryDate:
          type: string
        deliveryTime:
          type: string
        deliveryType:
          type: string
        price:
          type: number
        paymentStatus:
          type: string
        status:
          type: string
        specialRequests:
          type: string
        notes:
          type: string
        source:
          type: string
        confidence:
          type: ["integer", "null"]
    OrderBulkInput:
      type: object
      required:
        - orders
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderInput"
